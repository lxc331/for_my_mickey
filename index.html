<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可爱问候</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffd1dc, #a2d2ff);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .cartoon-character {
            width: 200px;
            height: 200px;
            position: relative;
            margin-bottom: 30px;
        }

        .head {
            width: 150px;
            height: 150px;
            background-color: #ffb6c1;
            border-radius: 50%;
            position: absolute;
            top: 25px;
            left: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .eye {
            width: 25px;
            height: 25px;
            background-color: #fff;
            border-radius: 50%;
            position: absolute;
            top: 60px;
            animation: blink 4s infinite;
        }

        .eye.left {
            left: 50px;
        }

        .eye.right {
            right: 50px;
        }

        .pupil {
            width: 12px;
            height: 12px;
            background-color: #333;
            border-radius: 50%;
            position: absolute;
            top: 6px;
            left: 6px;
        }

        .mouth {
            width: 60px;
            height: 30px;
            border-bottom: 5px solid #ff6b6b;
            border-radius: 0 0 50% 50%;
            position: absolute;
            top: 100px;
            left: 70px;
            animation: smile 3s infinite;
        }

        .body {
            width: 120px;
            height: 100px;
            background-color: #ffb6c1;
            border-radius: 50% 50% 40% 40%;
            position: absolute;
            top: 130px;
            left: 40px;
        }

        .arm {
            width: 20px;
            height: 60px;
            background-color: #ffb6c1;
            position: absolute;
            top: 140px;
            border-radius: 10px;
            animation: wave 2s infinite alternate;
        }

        .arm.left {
            left: 20px;
            transform-origin: top center;
        }

        .arm.right {
            right: 20px;
            transform-origin: top center;
        }

        .message-box {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-text {
            font-size: 18px;
            color: #ff6b6b;
            font-weight: bold;
            text-align: center;
            line-height: 1.4;
        }

        .greeting-btn {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }

        .greeting-btn:hover {
            background-color: #ff5252;
            transform: scale(1.05);
        }

        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #ff6b6b;
            transform: rotate(-45deg);
            animation: float 5s infinite;
        }

        .heart:before, .heart:after {
            content: '';
            width: 20px;
            height: 20px;
            background-color: #ff6b6b;
            border-radius: 50%;
            position: absolute;
        }

        .heart:before {
            top: -10px;
            left: 0;
        }

        .heart:after {
            top: 0;
            left: 10px;
        }

        @keyframes blink {
            0%, 45%, 50%, 55%, 100% {
                height: 25px;
            }
            48%, 52% {
                height: 2px;
            }
        }

        @keyframes smile {
            0%, 100% {
                width: 60px;
                height: 30px;
            }
            50% {
                width: 50px;
                height: 25px;
            }
        }

        @keyframes wave {
            0% {
                transform: rotate(-20deg);
            }
            100% {
                transform: rotate(20deg);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cartoon-character">
            <div class="head"></div>
            <div class="eye left">
                <div class="pupil"></div>
            </div>
            <div class="eye right">
                <div class="pupil"></div>
            </div>
            <div class="mouth"></div>
            <div class="body"></div>
            <div class="arm left"></div>
            <div class="arm right"></div>
        </div>
        
        <div class="message-box">
            <div class="message-text">点击下方按钮获取专属祝福！</div>
        </div>
        
        <button class="greeting-btn">发送祝福</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const greetingBtn = document.querySelector('.greeting-btn');
            const messageText = document.querySelector('.message-text');
            
            // 预设的祝福语列表
            const greetings = [
                "愿你每天都有好心情！",
                "你是我心中最亮的星！",
                "和你在一起真开心！",
                "愿你被温柔以待！",
                "希望你永远快乐！",
                "你是最棒的！",
                "愿所有美好都围绕着你！",
                "今天也要开心哦！"
            ];
            
            greetingBtn.addEventListener('click', function() {
                // 随机选择一条祝福语
                const randomGreeting = greetings[Math.floor(Math.random() * greetings.length)];
                
                // 显示祝福语
                messageText.textContent = randomGreeting;
                
                // 添加点击反馈动画
                greetingBtn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    greetingBtn.style.transform = 'scale(1)';
                }, 100);
                
                // 创建飘浮的心形
                createHearts();
            });
            
            // 创建飘浮的心形函数
            function createHearts() {
                for (let i = 0; i < 5; i++) {
                    const heart = document.createElement('div');
                    heart.classList.add('heart');
                    
                    // 随机位置
                    heart.style.left = Math.random() * window.innerWidth + 'px';
                    heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                    heart.style.width = (Math.random() * 15 + 10) + 'px';
                    heart.style.height = heart.style.width;
                    
                    document.body.appendChild(heart);
                    
                    // 移除动画完成后的心形元素
                    setTimeout(() => {
                        heart.remove();
                    }, 5000);
                }
            }
        });
    </script>
</body>
</html>
